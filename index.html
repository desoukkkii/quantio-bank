<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureBank | Modern Banking System</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="bank-header">
        <div class="logo">
          <i class="fas fa-university"></i>
          <h1>SecureBank</h1>
        </div>
        <p class="tagline">Your Trusted Banking Partner</p>
      </header>

      <!-- Main Banking Grid -->
      <div class="banking-grid">
        <!-- Account Summary Card -->
        <div class="card account-card">
          <h2><i class="fas fa-user-circle"></i> Account Summary</h2>
          <div id="accountInfo" class="account-info">
            <div class="info-row">
              <span>Account Holder:</span>
              <strong id="accountHolder">John Doe</strong>
            </div>
            <div class="info-row">
              <span>Account Number:</span>
              <strong id="accountNumber">****1234</strong>
            </div>
            <div class="info-row balance-row">
              <span>Current Balance:</span>
              <strong id="balance">$0.00</strong>
            </div>
          </div>
          <button id="createAccountBtn" class="btn-primary full-width">
            <i class="fas fa-plus-circle"></i> Create New Account
          </button>
        </div>

        <!-- Quick Actions Card -->
        <div class="card actions-card">
          <h2><i class="fas fa-bolt"></i> Quick Actions</h2>
          <div class="action-buttons">
            <button id="depositBtn" class="btn-success">
              <i class="fas fa-arrow-down"></i> Deposit
            </button>
            <button id="withdrawBtn" class="btn-danger">
              <i class="fas fa-arrow-up"></i> Withdraw
            </button>
            <button id="transferBtn" class="btn-info">
              <i class="fas fa-exchange-alt"></i> Transfer
            </button>
          </div>
        </div>

        <!-- Transaction History Card -->
        <div class="card history-card">
          <h2><i class="fas fa-history"></i> Recent Transactions</h2>
          <div id="transactionList" class="transaction-list">
            <div class="empty-state">
              <i class="fas fa-receipt"></i>
              <p>No transactions yet</p>
              <small>Make a deposit to get started</small>
            </div>
          </div>
          <button id="clearHistoryBtn" class="btn-secondary full-width">
            <i class="fas fa-trash-alt"></i> Clear History
          </button>
        </div>
      </div>
    </div>

    <!-- Modal for Deposits/Withdrawals/Transfers -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Transaction</h2>
          <span class="close">&times;</span>
        </div>
        <div class="modal-body">
          <form id="transactionForm">
            <div id="transferAccountField" style="display: none">
              <label for="transferAccount">Transfer to Account Number:</label>
              <input
                type="text"
                id="transferAccount"
                placeholder="Enter account number"
              />
            </div>
            <label for="amount">Amount ($):</label>
            <input
              type="number"
              id="amount"
              step="0.01"
              min="0.01"
              required
              placeholder="0.00"
            />
            <div class="modal-buttons">
              <button type="submit" class="btn-primary">Confirm</button>
              <button type="button" class="btn-secondary cancel-btn">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Create Account Modal -->
    <div id="createAccountModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Create New Account</h2>
          <span class="close-create">&times;</span>
        </div>
        <div class="modal-body">
          <form id="createAccountForm">
            <label for="newAccountHolder">Account Holder Name:</label>
            <input
              type="text"
              id="newAccountHolder"
              required
              placeholder="Full name"
            />
            <label for="initialDeposit">Initial Deposit ($):</label>
            <input
              type="number"
              id="initialDeposit"
              step="0.01"
              min="0"
              value="0"
              placeholder="0.00"
            />
            <div class="modal-buttons">
              <button type="submit" class="btn-primary">Create Account</button>
              <button type="button" class="btn-secondary cancel-create">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
  </body>
</html>
