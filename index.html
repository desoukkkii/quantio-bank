<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QUANTIO Bank | Online Banking</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header class="header" id="top">
    <div class="header-inner">
      <div class="logo">
        <svg viewBox="0 0 28 28" width="28" height="28" aria-hidden="true">
          <rect x="2" y="8" width="24" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <rect x="6" y="12" width="4" height="8" rx="1" fill="currentColor" opacity="0.5"/>
          <rect x="12" y="12" width="4" height="8" rx="1" fill="currentColor" opacity="0.5"/>
          <rect x="18" y="12" width="4" height="8" rx="1" fill="currentColor" opacity="0.5"/>
          <rect x="3" y="3" width="22" height="3" rx="1" fill="currentColor" opacity="0.2"/>
        </svg>
        <span>QUANTIO <span class="logo-light">Bank</span></span>
      </div>
      <div class="header-badge">FDIC Insured</div>
    </div>
  </header>

  <main>
  <div class="welcome" id="welcomeBar">
    <div class="welcome-left">
      <svg viewBox="0 0 18 18" width="16" height="16" aria-hidden="true">
        <circle cx="9" cy="6" r="3" fill="currentColor" opacity="0.6"/>
        <path d="M2 16c0-4 3.5-6 7-6s7 2 7 6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
      </svg>
      <span id="welcomeMessage">Welcome to QUANTIO Bank</span>
    </div>
    <button class="btn btn-outline btn-sm" id="switchAccountBtn">Switch Account</button>
  </div>

  <div class="grid">
    <section class="card">
      <div class="card-title">
        <svg viewBox="0 0 18 18" width="16" height="16" aria-hidden="true">
          <rect x="1" y="3" width="16" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <rect x="4" y="7" width="3" height="4" rx="0.5" fill="currentColor" opacity="0.4"/>
          <rect x="9" y="7" width="3" height="4" rx="0.5" fill="currentColor" opacity="0.4"/>
          <rect x="14" y="7" width="3" height="4" rx="0.5" fill="currentColor" opacity="0.4"/>
        </svg>
        <h2>My Account</h2>
      </div>

      <div class="balance-card">
        <span class="balance-label">Available Balance</span>
        <div class="balance-amount" id="balanceDisplay">$0.00</div>
        <div class="account-num" id="accountNumberDisplay">
          <span class="acct-dot"></span>
          <span>No Account</span>
        </div>
      </div>

      <div class="action-row">
        <button class="btn btn-primary" id="depositBtn">Deposit</button>
        <button class="btn btn-outline" id="withdrawBtn">Withdraw</button>
        <button class="btn btn-outline" id="transferBtn">Transfer</button>
      </div>

      <button class="btn btn-link" id="createAccountBtn">+ Open New Account</button>
    </section>

    <section class="card">
      <div class="card-title">
        <svg viewBox="0 0 18 18" width="16" height="16" aria-hidden="true">
          <rect x="2" y="2" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 9l2 2 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <h2>Transactions</h2>
        <button class="btn btn-text btn-sm" id="resetBtn">Reset</button>
      </div>
      <div class="tx-list" id="transactionsList">
        <div class="tx-empty">
          <p>No transactions yet</p>
          <span>Deposit or transfer to get started</span>
        </div>
      </div>
    </section>
  </div>

  <div class="accounts-bar" id="accountSummary" hidden>
    <h3>Your Accounts</h3>
    <div class="accounts-row" id="accountsList"></div>
  </div>

  </main>

  <footer class="footer">
    <p>&copy; 2025 QUANTIO Bank, N.A. &mdash; Member FDIC</p>
  </footer>
</div>

<!-- Modals -->
<div class="modal-overlay" id="actionModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Transaction</h3>
      <button type="button" class="modal-x" id="closeModalBtn" aria-label="Close">&times;</button>
    </div>
    <form id="transactionForm">
      <div class="field">
        <label for="amountInput">Amount</label>
        <div class="input-group">
          <span class="input-symbol">$</span>
          <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0.01" required autocomplete="off" />
        </div>
      </div>
      <div class="field hidden" id="transferField">
        <label for="recipientInput">Recipient Account Number</label>
        <input type="text" id="recipientInput" placeholder="e.g. SB1234567890" autocomplete="off" />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelModalBtn">Cancel</button>
        <button type="submit" class="btn btn-primary">Confirm</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="createAccountModal">
  <div class="modal">
    <div class="modal-head">
      <h3>Open New Account</h3>
      <button type="button" class="modal-x close-create" aria-label="Close">&times;</button>
    </div>
    <form id="createAccountForm">
      <div class="field">
        <label for="newAccountHolder">Account Holder</label>
        <input type="text" id="newAccountHolder" placeholder="Full name" required autocomplete="off" />
      </div>
      <div class="field">
        <label for="initialDeposit">Initial Deposit</label>
        <div class="input-group">
          <span class="input-symbol">$</span>
          <input type="number" id="initialDeposit" step="0.01" min="0" value="0" placeholder="0.00" autocomplete="off" />
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelCreateBtn">Cancel</button>
        <button type="submit" class="btn btn-primary">Open Account</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="switchAccountModal">
  <div class="modal">
    <div class="modal-head">
      <h3>Switch Account</h3>
      <button type="button" class="modal-x close-switch" aria-label="Close">&times;</button>
    </div>
    <div class="switch-list" id="switchAccountsList"></div>
    <div class="modal-actions switch-actions">
      <button type="button" class="btn btn-outline" id="cancelSwitchBtn">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" role="alert" aria-live="polite"></div>

<script src="script.js"></script>
</body>
</html>
